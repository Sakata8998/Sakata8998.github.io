<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  const BLOG_CONFIG = {
    blogName: "Husayn's Journal",
    blogTagline: "reading, thinking, writing",
    heroTitle: "Notes from a reader still figuring things out",
    heroDescription: "Book reviews, translations, politics, and the occasional honest thought. Written in Bangla and English — sometimes both at once.",
    authorName: "Husayn",
    aboutText: [
      "I am a first-year International Relations student at the University of Chittagong. I came from Dhaka.",
      "I read — Bengali literature, English fiction, the occasional dense non-fiction that makes me feel smart for about two pages. I write here to think more clearly.",
      "This is my journal. Also my portfolio. Sometimes both at the same time."
    ],
    categories: [
      "Book Review", "Summary & Notes", "Personal", "Politics", "Translation", "My Writings"
    ]
  };
</script>

<title>Husayn's Journal</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f7f4; --surface: #ffffff; --text: #1a1a1a; --muted: #6e6e6e;
    --faint: #a8a8a8; --border: #e4e0da; --accent: #8b4513;
    --accent-bg: #fdf3ec; --accent-hover: #6b3410;
    --serif: 'Georgia','Times New Roman',serif; --sans: -apple-system,'Helvetica Neue',Arial,sans-serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--serif); font-size:17px; line-height:1.8; min-height:100vh; }

  .currently-reading {
    max-width: 680px;
    margin: 2.8rem auto 2rem;
    padding: 1.8rem 2rem;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(139, 69, 19, 0.08);
    position: relative;
    overflow: hidden;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cr-content {
    flex: 1;
  }
  .cr-label {
    font-family: var(--sans);
    font-size: 10.8px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .cr-book {
    font-size: 1.28rem;
    line-height: 1.45;
    color: #2c2c2c;
    font-style: italic;
  }
  .edit-cr-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .edit-cr-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Other styles remain same (I kept them short here) */
  .hero { max-width:680px; margin:4rem auto 0; padding:0 2rem; }
  .filter-bar, .posts-section { max-width:680px; margin:0 auto; padding:0 2rem; }
  .nav { background:var(--surface); border-bottom:1px solid var(--border); height:56px; padding:0 2rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
</style>
</head>
<body>

<nav>
  <span class="nav-brand" id="navBrand" onclick="show('home')"></span>
  <ul class="nav-links">
    <li><button class="nav-btn" onclick="show('home')">Writing</button></li>
    <li><button class="nav-btn" onclick="show('about')">About</button></li>
    <li><button class="nav-btn primary" onclick="show('editor')">+ Write</button></li>
  </ul>
</nav>

<div id="homeView" class="view active">
  <div class="hero">
    <p class="hero-tag" id="heroTag"></p>
    <h1 id="heroH1"></h1>
    <p class="hero-sub" id="heroSub"></p>
    <div class="hero-rule"></div>
  </div>

  <!-- Currently Reading - Editable -->
  <div class="currently-reading">
    <div class="cr-content">
      <div class="cr-label">Currently Reading</div>
      <div class="cr-book" id="currentBook"></div>
    </div>
    <button class="edit-cr-btn" onclick="editCurrentlyReading()">✏️ Edit</button>
  </div>

  <div class="filter-bar" id="filterBar"></div>
  <div class="posts-section">
    <p class="posts-label">All writing</p>
    <input id="searchInput" type="text" class="search-input" placeholder="🔎 Search...">
    <div id="postsList"></div>
  </div>
</div>

<!-- Post, About, Editor views (same as before) -->
<div id="postView" class="view"> ... </div>
<div id="aboutView" class="view"> ... </div>
<div id="editorView" class="view"> ... </div>

<footer id="footer"></footer>

<script>
  const C = BLOG_CONFIG;
  let currentlyReading = localStorage.getItem('currentReading') || C.currentlyReading;

  // Boot
  document.getElementById('navBrand').textContent = C.blogName;
  document.getElementById('heroTag').textContent = C.blogTagline;
  document.getElementById('heroH1').textContent = C.heroTitle;
  document.getElementById('heroSub').textContent = C.heroDescription;
  document.getElementById('currentBook').textContent = currentlyReading;
  document.getElementById('footer').textContent = C.blogName + ' — ' + C.authorName;

  // Update Currently Reading
  function editCurrentlyReading() {
    const newBook = prompt("Currently Reading-এ কী পড়ছো?\n(যেমন: বইয়ের নাম — লেখক)", currentlyReading);
    if (newBook && newBook.trim() !== "") {
      currentlyReading = newBook.trim();
      localStorage.setItem('currentReading', currentlyReading);
      document.getElementById('currentBook').textContent = currentlyReading;
    }
  }

  // Rest of your full script (posts, editor, delete, image upload etc.)
  // ... (You can keep the full script from previous message)

</script>
</body>
</html>
