<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  const BLOG_CONFIG = {
    blogName: "Husayn's Journal",
    blogTagline: "reading, thinking, writing",
    heroTitle: "Notes from a reader still figuring things out",
    heroDescription: "Book reviews, translations, politics, and the occasional honest thought. Written in Bangla and English — sometimes both at once.",
    authorName: "Husayn",
    aboutText: [
      "I am a first-year International Relations student at the University of Chittagong. I came from Dhaka.",
      "I read — Bengali literature, English fiction, the occasional dense non-fiction that makes me feel smart for about two pages. I write here to think more clearly.",
      "This is my journal. Also my portfolio. Sometimes both at the same time."
    ],
    currentlyReading: "গোরা — রবীন্দ্রনাথ ঠাকুর",
    categories: [
      "Book Review",
      "Summary & Notes",
      "Personal",
      "Politics",
      "Translation",
      "My Writings"
    ]
  };
</script>

<title>Husayn's Journal</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f7f4;
    --surface: #ffffff;
    --text: #1a1a1a;
    --muted: #6e6e6e;
    --faint: #a8a8a8;
    --border: #e4e0da;
    --accent: #8b4513;
    --accent-bg: #fdf3ec;
    --accent-hover: #6b3410;
    --serif: 'Georgia','Times New Roman',serif;
    --sans: -apple-system,'Helvetica Neue',Arial,sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background:var(--bg); color:var(--text); font-family:var(--serif); font-size:17px; line-height:1.8; min-height:100vh; }
  a { color:inherit; text-decoration:none; }

  nav { background:var(--surface); border-bottom:1px solid var(--border); height:56px; padding:0 2rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .nav-brand { font-family:var(--sans); font-size:14px; font-weight:700; font-style:italic; color:var(--accent); cursor:pointer; }
  .nav-links { list-style:none; display:flex; align-items:center; gap:1.5rem; }
  .nav-btn { background:none; border:none; font-family:var(--sans); font-size:11.5px; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); cursor:pointer; padding:0; transition:color .15s; }
  .nav-btn:hover { color:var(--text); }
  .nav-btn.primary { background:var(--accent); color:#fff; padding:5px 13px; border-radius:3px; font-size:11px; }
  .nav-btn.primary:hover { background:var(--accent-hover); color:#fff; }

  .view { display:none; }
  .view.active { display:block; }

  .hero { max-width:680px; margin:4rem auto 0; padding:0 2rem; }
  .hero-tag { font-family:var(--sans); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin-bottom:1rem; }
  .hero h1 { font-size:clamp(1.9rem,4.5vw,2.75rem); font-weight:normal; line-height:1.18; margin-bottom:1.2rem; }
  .hero-sub { font-size:15.5px; color:var(--muted); max-width:500px; line-height:1.75; }
  .hero-rule { width:32px; height:1.5px; background:var(--accent); margin:2.25rem 0; }

  .filter-bar { max-width:680px; margin:0 auto; padding:0 2rem .75rem; display:flex; gap:8px; flex-wrap:wrap; }
  .filter-btn { background:none; border:1px solid var(--border); border-radius:20px; font-family:var(--sans); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); padding:4px 12px; cursor:pointer; transition:all .15s; }
  .filter-btn:hover { border-color:var(--accent); color:var(--accent); }
  .filter-btn.af { background:var(--accent); border-color:var(--accent); color:#fff; }

  .lang-pill { display:inline-block; font-family:var(--sans); font-size:9.5px; letter-spacing:.06em; padding:1px 7px; border-radius:20px; margin-left:6px; vertical-align:middle; font-weight:600; }
  .len { background:#e8f0fb; color:#1a4a8a; }
  .lbn { background:#fde8e8; color:#8a1a1a; }

  .posts-section { max-width:680px; margin:0 auto; padding:0 2rem 6rem; }
  .posts-label { font-family:var(--sans); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); padding-bottom:.9rem; border-bottom:1px solid var(--border); }
  .search-input {
    font-family: var(--sans);
    font-size: 13.5px;
    padding: 10px 18px;
    border: 1px solid var(--border);
    border-radius: 9999px;
    background: var(--surface);
    width: 100%;
    max-width: 340px;
    margin-bottom: 1.25rem;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .search-input:focus { border-color: var(--accent); outline: none; }

  .post-row { display:grid; grid-template-columns:68px 1fr; gap:1.5rem; padding:1.6rem 0; border-bottom:1px solid var(--border); cursor:pointer; }
  .post-row:hover .p-title { color:var(--accent); }
  .p-date { font-family:var(--sans); font-size:10.5px; color:var(--faint); padding-top:4px; line-height:1.5; }
  .p-cat { display:inline-block; font-family:var(--sans); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); background:var(--accent-bg); padding:2px 8px; border-radius:20px; margin-bottom:.4rem; }
  .p-title { font-size:1.1rem; font-weight:normal; line-height:1.4; margin-bottom:.4rem; transition:color .15s; }
  .p-excerpt { font-size:13.5px; color:var(--muted); line-height:1.6; }
  .empty-msg { padding:3.5rem 0; color:var(--muted); font-size:15px; }
  .empty-msg strong { display:block; font-weight:normal; color:var(--text); font-size:1.05rem; margin-bottom:.4rem; }

  #postView { max-width:680px; margin:0 auto; padding:2.5rem 2rem 6rem; }
  .post-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2.75rem; }
  .back-btn { background:none; border:none; font-family:var(--sans); font-size:11px; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); cursor:pointer; padding:0; display:inline-flex; align-items:center; gap:6px; transition:color .15s; }
  .back-btn:hover { color:var(--accent); }
  .post-actions { display:flex; gap:8px; }
  .action-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: .07em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .action-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .action-btn.danger {
    color: #c22;
    border-color: #f88;
  }
  .action-btn.danger:hover {
    background: #c22;
    color: #fff;
    border-color: #c22;
  }

  .s-cat { font-family:var(--sans); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:.8rem; }
  .s-title { font-size:clamp(1.6rem,4vw,2.15rem); font-weight:normal; line-height:1.22; margin-bottom:1.4rem; }
  .s-meta { font-family:var(--sans); font-size:12px; color:var(--faint); border-top:1px solid var(--border); padding-top:.9rem; margin-bottom:2.75rem; }
  .s-body { font-size:17px; line-height:1.87; }
  .s-body p { margin-bottom:1.5rem; }
  .s-body h2 { font-size:1.25rem; font-weight:normal; margin:2.5rem 0 .9rem; }
  .s-body h3 { font-size:1rem; font-weight:normal; margin:2rem 0 .7rem; color:var(--muted); }
  .s-body blockquote { border-left:2px solid var(--accent); padding:.2rem 0 .2rem 1.4rem; margin:1.8rem 0; color:var(--muted); font-style:italic; font-size:16px; }
  .s-body img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 2rem auto;
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(139,69,19,.08);
  }

  #aboutView { max-width:560px; margin:4rem auto; padding:0 2rem 6rem; }
  #aboutView h2 { font-size:1.75rem; font-weight:normal; margin-bottom:2rem; }
  #aboutView p { color:var(--muted); margin-bottom:1.3rem; line-height:1.82; }
  .about-reading { margin-top:2.5rem; padding-top:1.4rem; border-top:1px solid var(--border); font-family:var(--sans); font-size:12px; color:var(--faint); letter-spacing:.04em; }

  #editorView { max-width:680px; margin:3rem auto; padding:0 2rem 6rem; }
  .editor-label { font-family:var(--sans); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin-bottom:2.5rem; }
  .fg { margin-bottom:1.4rem; }
  .fl { display:block; font-family:var(--sans); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin-bottom:.45rem; }
  .fi,.fs,.ft { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:.72rem 1rem; font-family:var(--serif); font-size:15px; color:var(--text); outline:none; transition:border-color .15s; -webkit-appearance:none; appearance:none; }
  .fi:focus,.fs:focus,.ft:focus { border-color:var(--accent); }
  .ft { min-height:380px; resize:vertical; line-height:1.78; }
  .fh { font-family:var(--sans); font-size:11px; color:var(--faint); margin-top:.4rem; line-height:1.5; }
  .lang-toggle { display:flex; gap:8px; }
  .lang-opt { border:1px solid var(--border); border-radius:4px; padding:8px 20px; font-family:var(--sans); font-size:12px; cursor:pointer; background:none; color:var(--muted); transition:all .15s; }
  .lang-opt.sel { border-color:var(--accent); background:var(--accent-bg); color:var(--accent); font-weight:600; }
  
  /* Editor toolbar */
  .editor-toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    padding: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .toolbar-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--sans);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all .15s;
  }
  .toolbar-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .pub-btn { background:var(--accent); color:#fff; border:none; padding:.82rem 2rem; font-family:var(--sans); font-size:11px; letter-spacing:.1em; text-transform:uppercase; border-radius:4px; cursor:pointer; transition:background .15s; }
  .pub-btn:hover { background:var(--accent-hover); }
  .can-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:.82rem 1.5rem; font-family:var(--sans); font-size:11px; letter-spacing:.1em; text-transform:uppercase; border-radius:4px; cursor:pointer; margin-left:.7rem; }
  .can-btn:hover { border-color:var(--muted); }

  footer { border-top:1px solid var(--border); padding:1.75rem 2rem; text-align:center; font-family:var(--sans); font-size:11px; color:var(--faint); letter-spacing:.04em; }

  @media(max-width:580px) {
    nav { padding:0 1rem; }
    .hero,.posts-section,.filter-bar,#postView,#aboutView,#editorView { padding-left:1.25rem; padding-right:1.25rem; }
    .post-row { grid-template-columns:1fr; gap:.2rem; }
    .p-date { font-size:10px; padding-top:0; }
    .nav-links { gap:1rem; }
    .post-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .post-actions { width: 100%; justify-content: flex-end; }
  }
</style>
</head>
<body>

<nav>
  <span class="nav-brand" id="navBrand" onclick="show('home')"></span>
  <ul class="nav-links">
    <li><button class="nav-btn" onclick="show('home')">Writing</button></li>
    <li><button class="nav-btn" onclick="show('about')">About</button></li>
    <li><button class="nav-btn primary" onclick="show('editor')">+ Write</button></li>
  </ul>
</nav>

<div id="homeView" class="view active">
  <div class="hero">
    <p class="hero-tag" id="heroTag"></p>
    <h1 id="heroH1"></h1>
    <p class="hero-sub" id="heroSub"></p>
    <div class="hero-rule"></div>
  </div>
  <div class="filter-bar" id="filterBar"></div>
  <div class="posts-section">
    <p class="posts-label">All writing</p>
    <input id="searchInput" type="text" class="search-input" placeholder="🔎 Search titles or content...">
    <div id="postsList"></div>
  </div>
</div>

<div id="postView" class="view">
  <div class="post-header">
    <button class="back-btn" onclick="show('home')">← All writing</button>
    <div class="post-actions">
      <button class="action-btn" onclick="editCurrentPost()">✏️ Edit</button>
      <button class="action-btn danger" onclick="deleteCurrentPost()">🗑 Delete</button>
    </div>
  </div>
  <p class="s-cat" id="s_cat"></p>
  <h1 class="s-title" id="s_h1"></h1>
  <p class="s-meta" id="s_meta"></p>
  <div class="s-body" id="s_body"></div>
</div>

<div id="aboutView" class="view">
  <h2>About this journal</h2>
  <div id="aboutBody"></div>
  <p class="about-reading" id="aboutReading"></p>
</div>

<div id="editorView" class="view">
  <p class="editor-label">New entry</p>
  
  <div class="fg">
    <label class="fl">Language</label>
    <div class="lang-toggle">
      <button class="lang-opt sel" id="langEn" onclick="selLang('en')">English</button>
      <button class="lang-opt" id="langBn" onclick="selLang('bn')">বাংলা</button>
    </div>
  </div>
  
  <div class="fg">
    <label class="fl">Category</label>
    <select class="fs" id="inputCat"></select>
  </div>
  
  <div class="fg">
    <label class="fl">Title</label>
    <input class="fi" type="text" id="inputTitle" placeholder="What are you writing about?">
  </div>
  
  <div class="fg">
    <label class="fl">Body</label>
    <div class="editor-toolbar">
      <button type="button" class="toolbar-btn" onclick="insertMarkdown('## ')">## Heading</button>
      <button type="button" class="toolbar-btn" onclick="insertMarkdown('### ')">### Subheading</button>
      <button type="button" class="toolbar-btn" onclick="insertMarkdown('>> ')">» Blockquote</button>
      <button type="button" class="toolbar-btn" onclick="triggerImageUpload()">📷 Upload Image</button>
      <input type="file" id="imageUpload" accept="image/*" style="display:none;">
    </div>
    <textarea class="ft" id="inputBody" placeholder="Start writing here.&#10;&#10;Blank line = new paragraph&#10;>> text = blockquote&#10;## text = heading&#10;![alt](image) = image"></textarea>
    <p class="fh">Blank line = paragraph &nbsp;·&nbsp; &gt;&gt; = blockquote &nbsp;·&nbsp; ## / ### = headings &nbsp;·&nbsp; Upload or paste image URLs</p>
  </div>
  
  <div>
    <button class="pub-btn" id="publishBtn" onclick="publish()">Publish</button>
    <button class="can-btn" onclick="cancelEditor()">Cancel</button>
  </div>
</div>

<footer id="footer"></footer>

<script>
  const C = BLOG_CONFIG;
  const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  
  // Global state
  let lang = 'en';
  let filter = 'All';
  let searchTerm = '';
  let posts = [
    {
      id: 1,
      title: "First entry — why I am writing this",
      cat: "Personal",
      lang: "en",
      date: new Date().toISOString(),
      body: "Delete this post and write your own.\n\nClick + Write in the navigation above. Pick a category, choose your language, and start writing.\n\n>> A journal is not about recording what happened. It is about figuring out what it meant.\n\nThis is Husayn's Journal. Welcome."
    }
  ];
  let editingId = null;
  let currentPostId = null;

  // Boot
  document.getElementById('navBrand').textContent = C.blogName;
  document.getElementById('heroTag').textContent = C.blogTagline;
  document.getElementById('heroH1').textContent = C.heroTitle;
  document.getElementById('heroSub').textContent = C.heroDescription;
  document.getElementById('aboutReading').textContent = 'Currently reading: ' + C.currentlyReading;
  document.getElementById('footer').textContent = C.blogName + ' — ' + C.authorName;

  const ab = document.getElementById('aboutBody');
  C.aboutText.forEach(t => { const p = document.createElement('p'); p.textContent = t; ab.appendChild(p); });

  const cs = document.getElementById('inputCat');
  C.categories.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cs.appendChild(o); });

  // Load saved posts from localStorage (persists across refreshes)
  const saved = localStorage.getItem('husaynPosts');
  if (saved) posts = JSON.parse(saved);

  function fmt(d) { 
    const dt = new Date(d); 
    return `${dt.getDate()} ${MO[dt.getMonth()]} ${dt.getFullYear()}`; 
  }
  function pill(l) { 
    return l==='en' ? '<span class="lang-pill len">EN</span>' : '<span class="lang-pill lbn">বাং</span>'; 
  }
  function expt(b) { 
    const w = b.replace(/^(>>|##|###|\!\[.*?\]\(.*?\))/gm,'').replace(/\n/g,' ').trim().split(/\s+/); 
    return w.slice(0,28).join(' ')+(w.length>28?'…':''); 
  }

  // Save posts to localStorage
  function savePosts() {
    localStorage.setItem('husaynPosts', JSON.stringify(posts));
  }

  // Enhanced body parser with image support
  function parseBody(raw) {
    return raw.split(/\n{2,}/).filter(s=>s.trim()).map(b=>{
      const t = b.trim();
      if(t.startsWith('## ')) return `<h2>${t.slice(3)}</h2>`;
      if(t.startsWith('### ')) return `<h3>${t.slice(4)}</h3>`;
      if(t.startsWith('>> ')) return `<blockquote>${t.slice(3)}</blockquote>`;
      
      // Image support: ![alt text](url or data:base64)
      const imgMatch = t.match(/^\!\[([^\]]*)\]\(([^)]+)\)$/);
      if (imgMatch) {
        const alt = imgMatch[1] || 'Image';
        const url = imgMatch[2];
        return `<img src="${url}" alt="${alt}" loading="lazy">`;
      }
      
      return `<p>${t.replace(/\n/g,' ')}</p>`;
    }).join('');
  }

  function buildFilters() {
    const bar = document.getElementById('filterBar');
    bar.innerHTML = '';
    ['All', ...C.categories].forEach(f => {
      const b = document.createElement('button');
      b.className = 'filter-btn' + (f === filter ? ' af' : '');
      b.textContent = f;
      b.onclick = () => { filter = f; buildFilters(); renderList(); };
      bar.appendChild(b);
    });
  }

  function renderList() {
    const el = document.getElementById('postsList');
    el.innerHTML = '';
    
    let list = filter === 'All' ? [...posts] : posts.filter(p => p.cat === filter);
    
    // Search filter
    if (searchTerm && searchTerm.trim().length > 0) {
      const term = searchTerm.toLowerCase().trim();
      list = list.filter(p => 
        (p.title || '').toLowerCase().includes(term) || 
        (p.body || '').toLowerCase().includes(term)
      );
    }
    
    if (!list.length) {
      const msg = searchTerm 
        ? `<div class="empty-msg"><strong>No matching posts.</strong>Try different keywords or clear the search.</div>` 
        : `<div class="empty-msg"><strong>Nothing here yet.</strong>Click + Write to publish your first post.</div>`;
      el.innerHTML = msg;
      return;
    }
    
    // Always sort newest first (robust after delete/edit)
    list.sort((a, b) => new Date(b.date) - new Date(a.date));
    
    list.forEach(p => {
      const r = document.createElement('div');
      r.className = 'post-row';
      r.onclick = () => openPost(p.id);
      r.innerHTML = `<div class="p-date">${fmt(p.date)}</div><div><span class="p-cat">${p.cat}</span>${pill(p.lang)}<p class="p-title">${p.title}</p><p class="p-excerpt">${expt(p.body)}</p></div>`;
      el.appendChild(r);
    });
  }

  function openPost(id) {
    currentPostId = id;
    const p = posts.find(x=>x.id===id); 
    if(!p) return;
    document.getElementById('s_cat').innerHTML = p.cat + pill(p.lang);
    document.getElementById('s_h1').textContent = p.title;
    document.getElementById('s_meta').textContent = fmt(p.date) + ' — ' + C.authorName;
    document.getElementById('s_body').innerHTML = parseBody(p.body);
    show('post'); 
    window.scrollTo(0,0);
  }

  // Edit / Delete helpers
  function editCurrentPost() {
    if (!currentPostId) return;
    editPost(currentPostId);
  }
  
  function deleteCurrentPost() {
    if (!currentPostId) return;
    deletePost(currentPostId);
  }
  
  function editPost(id) {
    const p = posts.find(x => x.id === id);
    if (!p) return;
    
    editingId = id;
    document.getElementById('inputTitle').value = p.title;
    document.getElementById('inputBody').value = p.body;
    document.getElementById('inputCat').value = p.cat;
    lang = p.lang;
    selLang(lang);
    
    // Update button text
    document.getElementById('publishBtn').textContent = 'Update Post';
    
    show('editor');
    window.scrollTo(0,0);
  }
  
  function deletePost(id) {
    if (!confirm('🗑 Permanently delete this post? This cannot be undone.')) return;
    
    posts = posts.filter(p => p.id !== id);
    savePosts();
    currentPostId = null;
    show('home');
  }

  function selLang(l) {
    lang = l;
    document.getElementById('langEn').classList.toggle('sel', l==='en');
    document.getElementById('langBn').classList.toggle('sel', l==='bn');
  }

  // Insert markdown helpers
  function insertAtCursor(text) {
    const ta = document.getElementById('inputBody');
    if (!ta) return;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    ta.value = ta.value.substring(0, start) + text + ta.value.substring(end);
    ta.focus();
    ta.selectionStart = ta.selectionEnd = start + text.length;
  }
  
  function insertMarkdown(md) {
    insertAtCursor(md);
  }
  
  function triggerImageUpload() {
    document.getElementById('imageUpload').click();
  }

  function publish() {
    const t = document.getElementById('inputTitle').value.trim();
    const b = document.getElementById('inputBody').value.trim();
    const c = document.getElementById('inputCat').value;
    
    if(!t) { alert('Title দাও।'); return; }
    if(!b) { alert('কিছু লেখো।'); return; }
    
    if (editingId !== null) {
      // Update existing post
      const post = posts.find(x => x.id === editingId);
      if (post) {
        post.title = t;
        post.body = b;
        post.cat = c;
        post.lang = lang;
        post.date = new Date().toISOString(); // mark as edited
      }
      editingId = null;
      document.getElementById('publishBtn').textContent = 'Publish';
    } else {
      // New post
      posts.push({ 
        id: Date.now(), 
        title: t, 
        cat: c, 
        lang: lang, 
        date: new Date().toISOString(), 
        body: b 
      });
    }
    
    savePosts();
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputBody').value = '';
    renderList(); 
    show('home'); 
    window.scrollTo(0,0);
  }
  
  function cancelEditor() {
    editingId = null;
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputBody').value = '';
    document.getElementById('publishBtn').textContent = 'Publish';
    show('home');
  }

  const VIEWS = { home:'homeView', post:'postView', about:'aboutView', editor:'editorView' };
  function show(n) {
    Object.values(VIEWS).forEach(id=>document.getElementById(id).classList.remove('active'));
    document.getElementById(VIEWS[n]).classList.add('active');
    
    if (n !== 'editor') editingId = null;
    if (n === 'home') renderList();
    
    window.scrollTo(0,0);
  }

  // Final boot: build UI + listeners
  buildFilters();
  renderList();
  
  // Search listener
  const searchInputEl = document.getElementById('searchInput');
  searchInputEl.addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderList();
  });
  
  // Image upload handler (base64 embedding - fully self-contained)
  const imageUploadEl = document.getElementById('imageUpload');
  imageUploadEl.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    
    const reader = new FileReader();
    reader.onload = function(ev) {
      const dataUrl = ev.target.result;
      const alt = prompt('Alt text (for screen readers and SEO):', file.name.split('.')[0]) || 'Image';
      const syntax = `![${alt}](${dataUrl})`;
      insertAtCursor('\n\n' + syntax + '\n\n');
      // Reset input
      e.target.value = '';
    };
    reader.readAsDataURL(file);
  });
</script>
</body>
</html>
